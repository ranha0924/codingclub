<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>융합코딩부 Online Judge</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="container">
    <h1><a href="#" id="site-title">융합코딩부 Online Judge</a></h1>
    <p class="subtitle">파이썬 프로젝트 문제를 풀고, 샘플 입출력을 확인하세요.</p>
  </div>
</header>

<main class="container">

  <!-- List View -->
  <div id="view-list">
    <div class="toolbar">
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="초급">초급</button>
        <button class="filter-btn" data-filter="중급">중급</button>
      </div>
      <div class="pw-group">
        <input type="password" id="pw-input-list" placeholder="코드 열람 비밀번호">
        <button class="pw-btn" onclick="pwCheck('pw-input-list')">확인</button>
        <span class="pw-status" id="pw-status-list"></span>
      </div>
    </div>

    <table class="problem-table">
      <thead>
        <tr>
          <th class="col-id">#</th>
          <th class="col-title">문제</th>
          <th class="col-diff">난이도</th>
        </tr>
      </thead>
      <tbody id="problem-tbody"></tbody>
    </table>
  </div>

  <!-- Detail View -->
  <div id="view-detail" style="display:none">
    <button class="back-btn" onclick="location.hash=''">&larr; 목록으로</button>

    <div class="detail-header">
      <span class="detail-id" id="detail-id"></span>
      <h2 id="detail-title"></h2>
      <span id="detail-diff"></span>
    </div>

    <div class="detail-section">
      <h3>문제 설명</h3>
      <p id="detail-desc"></p>
    </div>

    <div class="detail-section">
      <h3>샘플 입출력</h3>
      <div class="terminal" id="detail-terminal"></div>
    </div>

    <div class="detail-section" id="code-section">
      <h3>코드</h3>
      <div class="pw-group pw-inline">
        <input type="password" id="pw-input-detail" placeholder="코드 열람 비밀번호">
        <button class="pw-btn" onclick="pwCheck('pw-input-detail')">확인</button>
        <span class="pw-status" id="pw-status-detail"></span>
      </div>
      <pre class="code-block" id="detail-code"></pre>
    </div>
  </div>

</main>

<footer>
  <div class="container">
    <p>&copy; 2026 융합코딩부</p>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
